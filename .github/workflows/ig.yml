name: Instagram cron (mirror da Facebook)

on:
  schedule:
    # GitHub Actions salta/ritarda spesso gli scheduled cron → giriamo OGNI 30 MIN.
    # È idempotente (specchia FB→IG, dedup): pubblica solo i pendenti, gli altri run sono no-op.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # avvio manuale per test

permissions:
  contents: write

concurrency:
  group: ig-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet pynacl
      - name: Pubblica su Instagram
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          IG_MAX: "4"
        run: python3 cloud_ig_publish.py
      - name: Salva stato (ig_posted.json)
        run: |
          git config user.name "ig-cron"
          git config user.email "ig-cron@users.noreply.github.com"
          git add ig_posted.json
          git commit -m "stato IG aggiornato [skip ci]" || echo "nessuna modifica"
          git push || echo "push non necessario"
